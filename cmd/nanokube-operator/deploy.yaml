# Minimal Kind-verification manifest for nanokube-operator (Step 1
# skeleton -- no Helm chart yet, see cmd/nanokube-operator/Dockerfile
# and internal/operator). Apply after `kind load docker-image
# localhost/nanokube-operator:step1 --name <cluster>`:
#
#   kubectl apply -f cmd/nanokube-operator/deploy.yaml
#
# RBAC mirrors the +kubebuilder:rbac marker on
# internal/operator.Reconciler.Reconcile: get/list/watch on ConfigMaps,
# cluster-wide (no CRD/namespace scoping exists yet -- Step 4).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanokube-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nanokube-operator
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nanokube-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nanokube-operator
subjects:
  - kind: ServiceAccount
    name: nanokube-operator
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanokube-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanokube-operator
  template:
    metadata:
      labels:
        app: nanokube-operator
    spec:
      serviceAccountName: nanokube-operator
      containers:
        - name: nanokube-operator
          image: localhost/nanokube-operator:step1
          imagePullPolicy: IfNotPresent
          args:
            - --configmap-name=nanokube-desired-input
            - --configmap-namespace=default
            - --output-dir=/var/lib/nanokube-operator/pushed
            # 169.254.1.2 is this dev host's rootless-podman pasta uplink
            # address, reachable from inside a pod on Kind's podman
            # provider without hostNetwork (confirmed empirically: it's
            # the same address /etc/hosts' host.containers.internal
            # resolves to on containers sharing the "kind" bridge
            # network). On a different host/provider this needs
            # rediscovering -- see internal/operator's real-push task
            # report for how.
            - --agent-addr=169.254.1.2:9090
