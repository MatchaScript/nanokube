# Devenv-only: /home is a symlink to /var/home on ostree/bootc systems, and
# content written into /var at container-build time is NOT part of the
# deployed OS (only /usr and the default /etc are committed directly; /var is
# seeded from scratch via tmpfiles.d at first boot). Without these entries the
# devenv user's home directory and SSH authorized_keys would silently not
# exist on the booted VM. The key material itself lives under /usr (stable,
# persists like any other image content) and is copied into place here.
d /var/home/devenv 0700 devenv devenv -
d /var/home/devenv/.ssh 0700 devenv devenv -
C /var/home/devenv/.ssh/authorized_keys 0600 devenv devenv - /usr/share/nanokube-devenv/authorized_keys
