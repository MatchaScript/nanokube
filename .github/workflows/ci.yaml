name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Go unit / integration tests. Fast (seconds) and require no privileges;
  # every PR runs this.
  # ---------------------------------------------------------------------------
  unit:
    name: Go unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(go list -f '{{.Dir}}' ./... | grep -v '/reference/'))
          if [[ -n "$unformatted" ]]; then
            echo "gofmt violations:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race -count=1 -timeout=3m ./...

  # ---------------------------------------------------------------------------
  # E2E suite — installs CRI-O, kubelet, kubectl on the runner via
  # test/e2e/setup.sh, then drives the full init → boot → workload →
  # reset lifecycle as a Go testify suite. Slow (~10 min) and needs sudo,
  # so kept in its own job that only gates merges.
  # ---------------------------------------------------------------------------
  e2e:
    name: End-to-end suite
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NANOKUBE_E2E_PREBUILT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Build nanokube
        run: |
          mkdir -p bin
          go build -o bin/nanokube ./cmd/nanokube
          sudo install -m 0755 bin/nanokube /usr/bin/nanokube

      - name: go vet (e2e tag)
        run: go vet -tags e2e ./test/e2e/...

      - name: Run E2E suite
        run: |
          sudo -E env "PATH=$PATH" "HOME=$HOME" \
            go test -tags e2e -v -timeout 24m -count=1 ./test/e2e/...

      - name: Make diagnostics readable
        if: failure()
        run: sudo chmod -R a+rX /tmp/nanokube-e2e-* || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: /tmp/nanokube-e2e-*/
          if-no-files-found: ignore
