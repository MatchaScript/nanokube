name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Go unit / integration tests. Fast (seconds) and require no privileges;
  # every PR runs this.
  # ---------------------------------------------------------------------------
  unit:
    name: Go unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(go list -f '{{.Dir}}' ./... | grep -v '/reference/'))
          if [[ -n "$unformatted" ]]; then
            echo "gofmt violations:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test -race
        # internal/ddi is excluded: it hard-requires systemd-repart
        # (systemd 256+, not on ubuntu-24.04) and is covered for real by
        # the dedicated "DDI builder" job's Fedora container below.
        run: go test -race -count=1 -timeout=3m $(go list ./... | grep -v '/internal/ddi$')

  # ---------------------------------------------------------------------------
  # Rust agent (Local lane). Fast; every PR runs this.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust agent
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ---------------------------------------------------------------------------
  # DDI builder (Local lane build tooling). internal/ddi shells out to
  # systemd-repart --make-ddi=confext, which needs systemd 256+ and
  # erofs-utils (mkfs.erofs) — neither is on the plain ubuntu-24.04 runner,
  # so this job runs inside a Fedora container to actually exercise the
  # real, non-skipped build path.
  # ---------------------------------------------------------------------------
  ddi:
    name: DDI builder (confext)
    runs-on: ubuntu-24.04
    container:
      image: quay.io/fedora/fedora:42
      # SYS_ADMIN: TestBuildAppliesSELinuxLabels reads back a built
      # image's baked-in security.selinux xattr via fsck.erofs --extract
      # --xattrs, which itself calls setxattr("security.selinux", ...)
      # on the extracted files. The kernel's generic security.* xattr
      # write fallback (cap_inode_setxattr, taken whenever no LSM claims
      # the write more specifically -- the case here, since this runner
      # has no active SELinux) requires CAP_SYS_ADMIN; without it every
      # extraction fails with EPERM.
      options: --cap-add SYS_ADMIN
    steps:
      - name: Install build dependencies
        run: dnf install -y systemd-container systemd-udev erofs-utils gcc selinux-policy-targeted container-selinux libselinux-utils --setopt=install_weak_deps=False -q

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: go vet
        run: go vet ./internal/ddi/...

      - name: go build
        run: go build ./internal/ddi/...

      - name: go test -race
        run: go test -race -count=1 -v ./internal/ddi/...

  # ---------------------------------------------------------------------------
  # E2E suite — installs CRI-O, kubelet, kubectl on the runner via
  # test/e2e/setup.sh, then drives the full init → boot → workload →
  # reset lifecycle as a Go testify suite. Slow (~10 min) and needs sudo,
  # so kept in its own job that only gates merges.
  # ---------------------------------------------------------------------------
  e2e:
    name: End-to-end suite
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NANOKUBE_E2E_PREBUILT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Build nanokube
        run: |
          mkdir -p bin
          go build -o bin/nanokube ./cmd/nanokube
          sudo install -m 0755 bin/nanokube /usr/bin/nanokube

      - name: go vet (e2e tag)
        run: go vet -tags e2e ./test/e2e/...

      - name: Run E2E suite
        run: |
          sudo -E env "PATH=$PATH" "HOME=$HOME" \
            go test -tags e2e -v -timeout 24m -count=1 ./test/e2e/...

      - name: Make diagnostics readable
        if: failure()
        run: sudo chmod -R a+rX /tmp/nanokube-e2e-* || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: /tmp/nanokube-e2e-*/
          if-no-files-found: ignore
